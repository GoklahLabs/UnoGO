services:
  # ── Backend: Node.js + Socket.IO ────────────────────────────────────────────
  - type: web
    name: unogo-server
    env: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /health
    plan: free
    envVars:
      - key: NODE_ENV
        value: production

  # ── Frontend: React + Vite (Static Site) ───────────────────────────────────
  - type: web
    name: unogo-client
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    plan: free
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    envVars:
      # Após o primeiro deploy, copie a URL do serviço unogo-server aqui
      # Exemplo: https://unogo-server.onrender.com
      - key: VITE_SOCKET_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
